<style>
/* ===== Google Fonts ===== */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap');

/* ===== Reset & Base ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
  background: linear-gradient(160deg, #0a0a0a 0%, #1a0f00 30%, #0d0800 60%, #0a0a0a 100%);
  color: #f0e6d0;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ===== Background Particles Canvas ===== */
#bg-particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ===== Screen Switching ===== */
.screen {
  display: none;
  min-height: 100vh;
  padding: 40px 20px;
  position: relative;
  z-index: 1;
}

.screen.active {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#card-screen.active {
  justify-content: flex-start;
  padding-top: 30px;
}

/* ===== Start Screen ===== */
.start-container {
  text-align: center;
  animation: fadeInUp 1s ease-out;
}

.main-title {
  font-family: 'Playfair Display', serif;
  font-size: 4rem;
  font-weight: 900;
  background: linear-gradient(135deg, #ffd700 0%, #fff5b8 25%, #ffd700 50%, #f5a623 75%, #ffd700 100%);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 3s ease-in-out infinite;
  margin-bottom: 16px;
  letter-spacing: 0.08em;
  filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.3));
}

@keyframes shimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.subtitle {
  font-size: 1.2rem;
  color: #b8a070;
  margin-bottom: 40px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  font-weight: 300;
}

.member-count {
  font-size: 1.3rem;
  color: #d4b96a;
  margin-bottom: 32px;
  min-height: 1.6em;
}

.btn-start {
  position: relative;
  padding: 22px 70px;
  font-size: 1.5rem;
  font-weight: 700;
  color: #0a0a0a;
  background: linear-gradient(135deg, #ffd700, #f5a623, #ffd700);
  background-size: 200% 200%;
  border: 2px solid rgba(255, 215, 0, 0.6);
  border-radius: 60px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow:
    0 0 20px rgba(255, 215, 0, 0.3),
    0 0 60px rgba(255, 215, 0, 0.1),
    inset 0 1px 0 rgba(255, 255, 255, 0.3);
  animation: shimmer 3s ease-in-out infinite;
  letter-spacing: 0.05em;
}

.btn-start:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow:
    0 0 30px rgba(255, 215, 0, 0.5),
    0 0 80px rgba(255, 215, 0, 0.2),
    inset 0 1px 0 rgba(255, 255, 255, 0.3);
}

.btn-start:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.btn-start:active:not(:disabled) {
  transform: translateY(0);
}

.error-message {
  margin-top: 24px;
  color: #ff6b6b;
  font-size: 1rem;
  min-height: 1.4em;
}

/* ===== Card Screen ===== */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 28px;
  max-width: 1200px;
  width: 100%;
  margin: 0 auto 30px;
  padding: 0 10px;
}

/* ===== Card ===== */
.card-wrapper {
  perspective: 1000px;
  opacity: 0;
  animation: cardAppear 0.6s ease-out forwards;
}

.card {
  position: relative;
  width: 100%;
  height: 210px;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.card.flipped {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  overflow: hidden;
}

/* --- Front Face (unflipped) --- */
.card-front {
  background: linear-gradient(145deg, #1a1200 0%, #2a1f00 40%, #1a1200 100%);
  border: 2px solid rgba(255, 215, 0, 0.5);
  box-shadow:
    0 4px 20px rgba(0, 0, 0, 0.6),
    0 0 15px rgba(255, 215, 0, 0.15),
    inset 0 1px 0 rgba(255, 215, 0, 0.1);
}

/* Decorative corner ornaments */
.card-front::before {
  content: '?';
  font-family: 'Playfair Display', serif;
  font-size: 4.5rem;
  font-weight: 900;
  background: linear-gradient(135deg, #ffd700, #f5a623);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4));
}

.card-front::after {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(255, 215, 0, 0.15);
  border-radius: 10px;
  pointer-events: none;
}

.card-front .card-number {
  position: absolute;
  top: 14px;
  left: 18px;
  font-size: 0.9rem;
  color: rgba(255, 215, 0, 0.7);
  font-weight: 700;
  font-family: 'Playfair Display', serif;
}

/* --- Front Face (solo) --- */
.card-front.solo-front {
  background: linear-gradient(145deg, #1a0020 0%, #300040 40%, #1a0020 100%);
  border-color: rgba(200, 100, 255, 0.5);
  box-shadow:
    0 4px 20px rgba(0, 0, 0, 0.6),
    0 0 15px rgba(200, 100, 255, 0.15),
    inset 0 1px 0 rgba(200, 100, 255, 0.1);
}

.card-front.solo-front::before {
  content: '!';
  background: linear-gradient(135deg, #e080ff, #c050ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 10px rgba(200, 100, 255, 0.4));
}

.card-front.solo-front::after {
  border-color: rgba(200, 100, 255, 0.15);
}

.card-front.solo-front .card-number {
  color: rgba(200, 100, 255, 0.7);
}

.card-front.solo-front .solo-badge {
  position: absolute;
  bottom: 14px;
  font-size: 0.8rem;
  color: rgba(200, 100, 255, 0.8);
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* Pulse animation for unflipped cards */
.card:not(.flipped) .card-front {
  animation: pulse 2.5s ease-in-out infinite;
}

.card:not(.flipped) .card-front.solo-front {
  animation: pulseSolo 2.5s ease-in-out infinite;
}

@keyframes pulseSolo {
  0%, 100% {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), 0 0 15px rgba(200, 100, 255, 0.15);
  }
  50% {
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6), 0 0 30px rgba(200, 100, 255, 0.3), 0 0 60px rgba(200, 100, 255, 0.1);
  }
}

/* --- Back Face (pair card) --- */
.card-back {
  background: linear-gradient(145deg, #001a0a 0%, #003d1a 40%, #001a0a 100%);
  border: 2px solid rgba(0, 255, 100, 0.4);
  box-shadow:
    0 4px 20px rgba(0, 0, 0, 0.6),
    0 0 15px rgba(0, 255, 100, 0.1);
  transform: rotateY(180deg);
}

.card-back::after {
  content: '';
  position: absolute;
  inset: 8px;
  border: 1px solid rgba(0, 255, 100, 0.1);
  border-radius: 10px;
  pointer-events: none;
}

.card-back .pair-label {
  font-size: 0.85rem;
  color: #ffd700;
  margin-bottom: 12px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.card-back .pair-names {
  font-size: 1.4rem;
  font-weight: 700;
  color: #ffffff;
  text-align: center;
  line-height: 1.6;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
}

.card-back .pair-names .amp {
  display: block;
  font-size: 1rem;
  color: #ffd700;
  margin: 4px 0;
  filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.5));
}

/* --- Solo Card --- */
.card-back.solo {
  background: linear-gradient(145deg, #1a0020 0%, #400050 40%, #1a0020 100%);
  border-color: rgba(200, 100, 255, 0.5);
  box-shadow:
    0 4px 20px rgba(0, 0, 0, 0.6),
    0 0 15px rgba(200, 100, 255, 0.15);
}

.card-back.solo::after {
  border-color: rgba(200, 100, 255, 0.1);
}

.card-back.solo .pair-label {
  color: #e080ff;
}

.card-back.solo .solo-icon {
  font-size: 2rem;
  margin-bottom: 8px;
}

/* --- Solo Card: Spotlight Effect --- */
.card-wrapper.solo-spotlight {
  opacity: 1;
  animation: soloSpotlight 1.5s ease-in-out;
}

@keyframes soloSpotlight {
  0% { transform: scale(1); filter: brightness(1); }
  30% { transform: scale(1.08); filter: brightness(1.4) drop-shadow(0 0 30px rgba(200, 100, 255, 0.6)); }
  60% { transform: scale(1.05); filter: brightness(1.2) drop-shadow(0 0 20px rgba(200, 100, 255, 0.4)); }
  100% { transform: scale(1); filter: brightness(1); }
}

/* ===== Controls ===== */
.controls {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.btn-control {
  padding: 12px 28px;
  font-size: 1rem;
  font-weight: 600;
  color: #d4b96a;
  background: rgba(255, 215, 0, 0.05);
  border: 1px solid rgba(255, 215, 0, 0.25);
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn-control:hover:not(:disabled) {
  background: rgba(255, 215, 0, 0.12);
  border-color: rgba(255, 215, 0, 0.5);
  box-shadow: 0 0 15px rgba(255, 215, 0, 0.15);
  color: #ffd700;
}

.btn-control:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Reveal button emphasis */
.btn-reveal {
  display: block;
  margin: 0 auto 24px;
  background: linear-gradient(135deg, #ffd700, #f5a623, #ffd700);
  background-size: 200% 200%;
  color: #0a0a0a;
  border: 2px solid rgba(255, 215, 0, 0.6);
  font-size: 1.3rem;
  padding: 18px 48px;
  animation: fadeInUp 0.6s ease-out, shimmer 3s ease-in-out infinite;
  box-shadow:
    0 0 20px rgba(255, 215, 0, 0.3),
    0 0 60px rgba(255, 215, 0, 0.1);
  letter-spacing: 0.05em;
}

.btn-reveal:hover:not(:disabled) {
  background: linear-gradient(135deg, #ffe033, #ffbb33, #ffe033);
  background-size: 200% 200%;
  border-color: rgba(255, 215, 0, 0.8);
  box-shadow:
    0 0 30px rgba(255, 215, 0, 0.4),
    0 0 80px rgba(255, 215, 0, 0.15);
}

/* ===== Spreadsheet Link ===== */
.sheet-link {
  text-decoration: none;
  display: inline-block;
}

/* ===== Toast Notification ===== */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-100px);
  padding: 14px 28px;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 600;
  color: #fff;
  background: rgba(40, 167, 69, 0.95);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  z-index: 10000;
  opacity: 0;
  transition: transform 0.4s ease, opacity 0.4s ease;
  pointer-events: none;
  white-space: nowrap;
}

.toast.toast-error {
  background: rgba(220, 53, 69, 0.95);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== Completion Message ===== */
.complete-message {
  text-align: center;
  font-size: 1.8rem;
  font-weight: 900;
  background: linear-gradient(135deg, #ffd700, #ff6b6b, #ffd700);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 2s ease-in-out infinite;
  opacity: 0;
  transition: opacity 0.6s ease;
  margin-top: 10px;
  filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.3));
}

.complete-message.visible {
  opacity: 1;
}

/* ===== Confetti Canvas ===== */
#confetti-canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
}

/* ===== Animations ===== */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes cardAppear {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.9);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes pulse {
  0%, 100% {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), 0 0 15px rgba(255, 215, 0, 0.15);
  }
  50% {
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.6), 0 0 30px rgba(255, 215, 0, 0.3), 0 0 60px rgba(255, 215, 0, 0.1);
  }
}

/* ===== Responsive ===== */
@media (max-width: 600px) {
  .main-title {
    font-size: 2.5rem;
  }

  .subtitle {
    font-size: 0.9rem;
  }

  .btn-start {
    padding: 16px 40px;
    font-size: 1.2rem;
  }

  .screen-title {
    font-size: 1.2rem;
  }

  .card-grid {
    grid-template-columns: 1fr;
    gap: 16px;
  }

  .card {
    height: 180px;
  }

  .card-back .pair-names {
    font-size: 1.2rem;
  }
}
</style>
